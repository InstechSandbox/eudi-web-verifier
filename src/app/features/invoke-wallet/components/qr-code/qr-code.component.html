<div class="vc-verifiable-credential">
  <div>
    <mat-card class="example-card">
      <mat-card-content>
        <div *ngIf="showQrCode" class="qr-hero-copy">
          <p class="qr-title">Scan QR code to share your credentials</p>
          <p class="qr-subtitle">
            Open your wallet on your phone and scan this code. If you are already on the same
            device, use the wallet button below.
          </p>
        </div>

        <p *ngIf="showQrCode" class="qr-code-canvas">
          <qrcode
            [qrdata]="deepLinkTxt"
            [allowEmptyString]="false"
            [ariaLabel]="'QR Code image with the following content...'"
            [cssClass]="'center'"
            [elementType]="'canvas'"
            [errorCorrectionLevel]="'L'"
            [margin]="2"
            [title]="deepLinkTxt"
            [width]="isCrossDevice ? 360 : 300"
            (qrCodeURL)="onChangeURL($event)"
          />
        </p>

        <mat-divider *ngIf="showQrCode" />
        <div class="below-qr-code">
          <a
            *ngIf="showQrCode"
            class="qr-download-link"
            [href]="qrCodeDownloadLink"
            download="qrcode"
            title="download as image"
            >Download QR code</a
          >
          <p *ngIf="showQrCode" class="or-divider">Or use this device</p>
          <a mat-raised-button class="authorize" [href]="deepLinkTxt"
            >Open with your wallet on your phone</a
          >
        </div>

        <mat-divider />
      </mat-card-content>
      <mat-card-actions>
        <button mat-button (click)="openLogs()">View transaction logs</button>
      </mat-card-actions>
      <mat-card-footer>
        <mat-progress-bar *ngIf="isCrossDevice" mode="indeterminate" />
      </mat-card-footer>
    </mat-card>
  </div>
</div>
