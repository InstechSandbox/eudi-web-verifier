name: Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    uses: InstechSandbox/.github/.github/workflows/reusable-node-validation.yml@ee7c589b6edeb479707d21c3d256092319e7af88
    with:
      node-version: '20'
      install-command: npm install --no-fund --no-audit
      validate-command: npx ng lint && npx ng test --watch=false --browsers=ChromeHeadless && npm run build
      cache-dependency-path: package.json